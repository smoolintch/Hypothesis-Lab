name: Repo Guardrails

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  repo-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install API dev dependencies
        working-directory: services/api
        run: uv sync --locked --dev

      - name: Run repo guardrails baseline
        run: npm run test:repo-guardrails

  api-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install API dev dependencies
        working-directory: services/api
        run: uv sync --locked --dev

      - name: Run API smoke baseline
        run: npm run test:api-smoke
